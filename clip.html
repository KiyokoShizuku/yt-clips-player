<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>YouTube Clip</title>
  <link rel="icon" type="image/png" sizes="16x16" href="./icons/icon-16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icons/icon-32.png">
  <link rel="icon" type="image/png" sizes="48x48" href="./icons/icon-48.png">
  <link rel="icon" type="image/png" sizes="128x128" href="./icons/icon-128.png">
  <link rel="apple-touch-icon" href="./icons/icon-128.png">
  
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: system-ui, sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    main {
      width: min(96vw, calc(80vh * 16 / 9));
      padding: 24px;
      box-sizing: border-box;
    }

    #player-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: black;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.55);
    }

    #player {
      width: 100%;
      height: 100%;
    }

    .meta {
      margin-top: 12px;
      opacity: 0.82;
      font-size: 15px;
    }
  </style>
</head>

<body>
  <main>
    <div id="player-wrapper">
      <div id="player"></div>
    </div>

    <div class="meta" id="meta"></div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);

    const videoId = params.get("v");
    const start = Number(params.get("s") || 0);
    const end = Number(params.get("e") || start + 10);
    const loop = params.get("loop") !== "0";
    const pause = Number(params.get("p") || 0.5);

    let player = null;
    let timer = null;
    let isWaiting = false;

    const meta = document.getElementById("meta");
    
    function formatTimeHuman(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) {
        seconds = 0;
      }

      const totalTenths = Math.round(seconds * 10);
      const totalSeconds = Math.floor(totalTenths / 10);
      const tenths = totalTenths % 10;

      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const secs = totalSeconds % 60;

      return `${String(hours).padStart(2, "0")}:${String(minutes).padStart(2, "0")}:${String(secs).padStart(2, "0")}.${tenths}`;
    }

    function formatDuration(seconds) {
      if (!Number.isFinite(seconds) || seconds < 0) {
        seconds = 0;
      }

      const rounded = Math.round(seconds * 10) / 10;

      if (rounded < 60) {
        return `${rounded.toFixed(1)}s`;
      }

      return formatTimeHuman(rounded);
    }



    const clipDuration = Math.max(0, end - start);

    meta.textContent = loop
      ? `Clip: ${formatTimeHuman(start)} (${start.toFixed(1)}s) – ${formatTimeHuman(end)} (${end.toFixed(1)}s), Duration: ${formatDuration(clipDuration)}, Loop: on (after ${formatDuration(pause)})`
      : `Clip: ${formatTimeHuman(start)} (${start.toFixed(1)}s) – ${formatTimeHuman(end)} (${end.toFixed(1)}s), Duration: ${formatDuration(clipDuration)}, Loop: off`;

    function loadYouTubeApi() {
      if (window.YT && window.YT.Player) {
        createPlayer();
        return;
      }

      window.onYouTubeIframeAPIReady = createPlayer;

      const existingScript = document.querySelector('script[src="https://www.youtube.com/iframe_api"]');

      if (!existingScript) {
        const script = document.createElement("script");
        script.src = "https://www.youtube.com/iframe_api";
        script.async = true;
        document.head.appendChild(script);
      } else {
        existingScript.addEventListener("load", () => {
          if (window.YT && window.YT.Player) {
            createPlayer();
          }
        });
      }

      setTimeout(() => {
        if (!player && window.YT && window.YT.Player) {
          createPlayer();
        }
      }, 1000);
    }

    function createPlayer() {
      if (!videoId) {
        meta.textContent = "No YouTube video ID found in the URL.";
        return;
      }

      if (player) {
        return;
      }

      const playerElement = document.getElementById("player");
      playerElement.innerHTML = "";

      player = new YT.Player("player", {
        videoId,
        playerVars: {
          autoplay: 0,
          controls: 1,
          playsinline: 1,
          enablejsapi: 1,
          start: Math.floor(start),
          origin: window.location.origin
        },
        events: {
          onReady: onReady,
          onStateChange: onStateChange,
          onError: onError
        }
      });
    }

    function onReady() {
      player.cueVideoById({
        videoId,
        startSeconds: start
      });

      startLoopWatcher();
    }

    function onStateChange(event) {
      if (event.data === YT.PlayerState.PLAYING) {
        startLoopWatcher();
      }
    }

    function onError(event) {
      console.error("YouTube Player Error:", event.data);

      meta.textContent =
        `YouTube Player error: ${event.data}. Please reopen the page or check the video ID.`;
    }

    function startLoopWatcher() {
      if (timer) return;

      timer = setInterval(() => {
        if (!player || isWaiting) return;

        const state = player.getPlayerState();

        if (state !== YT.PlayerState.PLAYING) {
          return;
        }

        const currentTime = player.getCurrentTime();

        if (currentTime >= end) {
          if (!loop) {
            player.pauseVideo();

            if (timer) {
              clearInterval(timer);
              timer = null;
            }

            return;
          }

          isWaiting = true;
          player.pauseVideo();

          setTimeout(() => {
            player.seekTo(start, true);
            player.playVideo();
            isWaiting = false;
          }, pause * 1000);
        }
      }, 50);
    }

    window.addEventListener("beforeunload", () => {
      if (timer) {
        clearInterval(timer);
        timer = null;
      }

      if (player && typeof player.destroy === "function") {
        player.destroy();
        player = null;
      }
    });

    loadYouTubeApi();
  </script>
</body>
</html>
